definitions:
  model.HealthCheckResponse:
    properties:
      instance_id:
        example: instance-12345
        type: string
      message:
        example: OK
        type: string
      service_name:
        example: GoBe K03 API
        type: string
    type: object
  model.ShortenURLRequest:
    properties:
      exp:
        description: thời gian hết hạn (giây)
        example: 604800
        type: integer
      url:
        example: http://localhost:8081/v1/docs/index.html
        type: string
    type: object
  model.ShortenURLResponse:
    properties:
      code:
        type: string
    type: object
  utils.ErrorResponse:
    properties:
      error:
        type: string
      message:
        type: string
      status:
        type: string
    type: object
  utils.SuccessResponse:
    properties:
      data: {}
      message:
        type: string
      status:
        type: string
    type: object
host: localhost:8081
info:
  contact: {}
  description: |-
    REST API cho hệ thống GoBe K03 (health check, URL shortener, ...)
    Sử dụng Echo framework + Redis + Clean Architecture
  termsOfService: https://example.com/terms
  title: GoBe K03 Project API
  version: 1.0.0
paths:
  /v1/health-check:
    get:
      description: Kiểm tra trạng thái hoạt động của service và kết nối Redis
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.HealthCheckResponse'
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Check service health
      tags:
      - Health
  /v1/links/redirect/{code}:
    get:
      description: Redirect to original URL by short code
      parameters:
      - description: Short URL code
        in: path
        name: code
        required: true
        type: string
      responses:
        "302":
          description: Redirect to original URL
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Redirect short URL
      tags:
      - Links
  /v1/links/shorten:
    post:
      consumes:
      - application/json
      description: Generate a short code for a given URL
      parameters:
      - description: Shorten URL request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/model.ShortenURLRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/utils.SuccessResponse'
            - properties:
                data:
                  $ref: '#/definitions/model.ShortenURLResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/utils.ErrorResponse'
      summary: Shorten URL
      tags:
      - Links
swagger: "2.0"
tags:
- name: Health
- name: Links
