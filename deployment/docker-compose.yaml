version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  app:
    image: gin227/gobek03echo:dev
    # build:
    #   context: ../
    #   dockerfile: Dockerfile
    container_name: app-api
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - .env
  portal:
    image: ebvn/bookmark-app-portal:dev
    container_name: portal
    restart: always
  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:z
    depends_on:
      - app