version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DB}
      # Speed-up init + reduce log noise trên VM nhỏ (locale=C → byte-collation, không cần Unicode)
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --locale=C"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - app-network
    healthcheck:
      # -U/-d tránh false-positive (server listening nhưng auth/DB chưa ready)
      # -h 127.0.0.1 lock IPv4 (alpine pg_isready default UNIX socket, đôi khi flap)
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_DB} -h 127.0.0.1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s # cold-start init data dir ~10-15s lần đầu
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  app:
    image: gin227/gobek03echo:dev
    container_name: app-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - app-network

  portal:
    image: ebvn/bookmark-app-portal:dev
    container_name: portal
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - portal
    networks:
      - app-network

# 👇 BẮT BUỘC PHẢI CÓ
networks:
  app-network:
    driver: bridge