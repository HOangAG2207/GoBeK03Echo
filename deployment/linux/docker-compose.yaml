version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - app-network

  app:
    image: gin227/gobek03echo:dev
    container_name: app-api
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    env_file:
      - ../.env
    networks:
      - app-network

  portal:
    image: ebvn/bookmark-app-portal:dev
    container_name: portal
    restart: always
    networks:
      - app-network

  nginx:
    image: nginx:alpine
    container_name: nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
      - portal
    networks:
      - app-network

# 👇 BẮT BUỘC PHẢI CÓ
networks:
  app-network:
    driver: bridge