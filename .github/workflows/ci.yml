name: ci-pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v[0-9]+.[0-9]+.[0-9]+']

jobs:
  ci_pipeline:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout source
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      # 3. Run test + coverage
      - name: Run unit test
        run: |
          set -ex
          make test

      # 4. Login Docker (chỉ khi push)
      - name: Login Docker Hub
        if: ${{ github.event_name != 'pull_request' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push bằng Makefile của bạn
      - name: Build & Push Docker image
        if: ${{ github.event_name != 'pull_request' }}
        run: |
          IMAGE=${{ secrets.DOCKER_USERNAME }}/tag123

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG=${GITHUB_REF#refs/tags/}
          else
            TAG=dev
          fi

          make docker-build name=$IMAGE tag=$TAG
          make docker-release name=$IMAGE tag=$TAG